# Site + Plant Parameters
site:
  depth: 26.381765177291
  distance: 214
  distance_to_landfall: 116
  mean_windspeed: 9.16
plant:
  # Grid pattern is 1 nm x 0.8 nm. 1 nm = 1852 m. Rotor diameter is 215 m. 
  layout: grid
  num_turbines: 92
  # 1852/215 = 8.6
  row_spacing: 8.613953488
  substation_distance: 1
  # 0.8 * 1852/215 = 6.9
  turbine_spacing: 6.891162791
landfall:
  interconnection_distance: 11
  trench_length: 2
turbine: 12MW_generic
oss_design:
  num_substations: 3
# Vessels
array_cable_install_vessel: example_cable_lay_vessel
export_cable_install_vessel: example_cable_lay_vessel
export_cable_bury_vessel: example_cable_lay_vessel
oss_install_vessel: example_heavy_lift_vessel
spi_vessel: example_scour_protection_vessel
wtiv: example_wtiv
# Module Specific
OffshoreSubstationInstallation:
  feeder: example_heavy_feeder
  num_feeders: 1
array_system_design:
  cables:
  - XLPE_630mm_66kV
  - XLPE_185mm_66kV
  # 66, Up to 170. We stick to 66 kV
export_system_design:
  cables: XLPE_1000m_220kV
  # In the COP the options were 220/275 kV. 275 kV is the final election based on https://www.boem.gov/sites/default/files/documents/renewable-energy/state-activities/Ocean-Wind-Scoping-April-2021.pdf . We do not have a 275 kV in the library so we choose 220 kV export cables
  percent_added_length: 0.0
scour_protection_design:
  cost_per_tonne: 40
  scour_protection_depth: 1
# Configured Phases
design_phases:
- MonopileDesign
- ScourProtectionDesign
- ArraySystemDesign
- ExportSystemDesign
- OffshoreSubstationDesign
install_phases:
  ArrayCableInstallation: 0
  ExportCableInstallation: 2000
  MonopileInstallation: !!python/tuple
  - ScourProtectionInstallation
  - 0.5
  OffshoreSubstationInstallation: 0
  ScourProtectionInstallation: 0
  TurbineInstallation: !!python/tuple
  - MonopileInstallation
  - 0.1
  
#install_phases:
  #ArrayCableInstallation: 0
  #ExportCableInstallation: 0
  #MooredSubInstallation: 0
  #MooringSystemInstallation: 0
  #OffshoreSubstationInstallation: 0
  #TurbineInstallation: 0
# Project Inputs
project_parameters:
  turbine_capex: 1500
  commissioning: 0.01
  decommissioning: 0.15
